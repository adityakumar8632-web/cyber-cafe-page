<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyber Cafe Services</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Cyber Cafe</h1>
  </header>

  <main>

    <!-- PRINT SERVICES -->
    <section class="service-section">
      <h2>Print Services</h2>
      <div class="card-grid">

        <div class="card" data-service="print">
          <h3>Printout</h3>
        </div>

        <div class="card" data-service="xerox">
          <h3>Xerox</h3>
        </div>

        <div class="card" data-service="scan">
          <h3>Scanning</h3>
        </div>

      </div>
    </section>

    <!-- ONLINE SERVICES -->
    <section class="service-section">
      <h2>Online Services</h2>
      <div class="card-grid">

        <div class="card" data-service="pan">
          <h3>PAN Card</h3>
        </div>

        <div class="card" data-service="aadhar">
          <h3>Aadhar Update</h3>
        </div>

        <div class="card" data-service="form">
          <h3>Online Form Fill</h3>
        </div>

      </div>
    </section>

    <!-- OTHER SERVICES -->
    <section class="service-section">
      <h2>Other Services</h2>
      <div class="card-grid">

        <div class="card" data-service="lamination">
          <h3>Lamination</h3>
        </div>

        <div class="card" data-service="photo">
          <h3>Passport Photo</h3>
        </div>

      </div>
    </section>

    <!-- OPTIONS PANEL -->
    <section id="options-panel">
      <h2 id="form-title">Select a service</h2>

      <div id="form-container">
        <!-- Dynamic inputs will come here -->
      </div>
    </section>

    <!-- PREVIEW SECTION -->
    <section id="preview-section">
      <h2>Preview</h2>

      <div id="preview-box">
        <p>No preview available</p>
      </div>
    </section>

  </main>

  <!-- SINGLE ACTION BAR (NO DUPLICATES) -->
  <div class="fixed-actions">

    <button id="whatsapp-btn" disabled>
      Send to WhatsApp
    </button>

    <button id="location-btn">
      View Location
    </button>

  </div>
<script src="script.js"></script>
</body>
</html>
